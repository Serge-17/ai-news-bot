services:
  - type: worker          # ✅ ИСПРАВЛЕНИЕ: worker не засыпает и не требует HTTP health-check
    name: ai-news-bot
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: GEMINI_TOKEN
        sync: false
      - key: CHECK_INTERVAL
        value: "1800"
      - key: MAX_PER_FEED
        value: "2"
      - key: DB_PATH
        value: "/tmp/ai_news.db"
